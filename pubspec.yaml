name: mako_meme
description: "跨平台表情包管理器"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.10.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^8.1.7
  share_plus: ^10.1.4
  uuid: ^4.5.1
  mime: ^2.0.0
  fuzzy: ^0.5.1
  photo_view: ^0.15.0
  archive: ^4.0.2
  desktop_drop: ^0.7.1
  dynamic_color: ^1.7.0
  url_launcher: ^6.3.1
  http: ^1.3.0
  package_info_plus: ^8.3.0
  crypto: ^3.0.5
  webdav_client: ^1.0.0
  dart_earcut: ^1.2.0
  hive: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  windows:
    generate: true
  image_path: "assets/icon_foreground.png"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/l10n/
