# Mako Meme CI/CD
#
# 推送构建:
#   main 分支推送 -> 构建 Android APK + Web + Windows
# 打 Tag 自动 Release:
#   git tag v1.0.0 && git push origin v1.0.0
#   -> 构建所有平台 + 创建 GitHub Release + 上传产物
# 构建结果通过飞书 Webhook 通知

name: CI/CD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  FLUTTER_VERSION: "3.44.2"

jobs:
  # --- Static Analysis ---
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos

  # --- Android Build ---
  android:
    name: Build Android
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - name: Rename APKs with ABI suffix
        shell: bash
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          cd build/app/outputs/apk/release
          for f in app-*-release.apk; do
            [ -f "$f" ] || continue
            abi=$(echo "$f" | sed 's/app-\(.*\)-release\.apk/\1/')
            mv "$f" "mako_meme-${VERSION}-${abi}.apk"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/apk/release/*.apk

  # --- Web Build ---
  web:
    name: Build Web
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  # --- Windows Build ---
  windows:
    name: Build Windows
    needs: analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" tools\setup.iss
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/windows/x64/runner/Release/*-setup.exe

  # --- GitHub Pages Deploy ---
  deploy-pages:
    name: Deploy Web to Pages
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: web
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # --- Create Release (on tag) ---
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [android, web, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Package artifacts
        shell: bash
        run: |
          mkdir release-artifacts
          cp -r android-apk/* release-artifacts/ 2>/dev/null || true
          cp -r windows-installer/*.exe release-artifacts/ 2>/dev/null || true
          cd web-build && zip -r ../release-artifacts/web-build.zip . && cd ..
      - uses: ncipollo/release-action@v1
        with:
          name: "Mako Meme ${{ github.ref_name }}"
          tag: ${{ github.ref }}
          body: |
            ## Mako Meme ${{ github.ref_name }}

            Cross-platform sticker manager release.

            ### Download

            - **Android (arm64-v8a)**: `mako_meme-v1.0.0-arm64-v8a.apk`
            - **Android (armeabi-v7a)**: `mako_meme-v1.0.0-armeabi-v7a.apk`
            - **Android (x86_64)**: `mako_meme-v1.0.0-x86_64.apk`
            - **Windows**: .exe installer
            - **Web**: `web-build.zip` (extract and deploy to any static server)

            > Built at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          artifacts: release-artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}

  # --- Feishu Notification ---
  notify:
    name: Notify Feishu
    if: ${{ always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}
    needs: [analyze, android, web, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Build status summary
        id: status
        shell: bash
        run: |
          STATUS="success"
          MSG=""
          append() {
            local label="$1" result="$2" cn_result
            if [ "$result" = "success" ]; then cn_result="成功"; else cn_result="失败"; fi
            MSG="${MSG}${label}: ${cn_result}\n"
            if [ "$result" != "success" ]; then STATUS="failure"; fi
          }
          append "静态分析" "${{ needs.analyze.result }}"
          append "安卓"     "${{ needs.android.result }}"
          append "Web"      "${{ needs.web.result }}"
          append "Windows"  "${{ needs.windows.result }}"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          {
            echo "msg<<EOFMSG"
            printf "%b" "$MSG"
            echo ""
            echo "EOFMSG"
          } >> "$GITHUB_OUTPUT"

      - name: Send Feishu webhook
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STATUS: ${{ steps.status.outputs.status }}
          SUMMARY: ${{ steps.status.outputs.msg }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "FEISHU_WEBHOOK_URL not set, skipping"
            exit 0
          fi

          if [ "$STATUS" = "success" ]; then
            export ICON="[PASS]"
            export TPL="green"
          else
            export ICON="[FAIL]"
            export TPL="red"
          fi

          cat > /tmp/gen_payload.py << 'PYEOF'
          import json, os
          summary = os.environ.get('SUMMARY', '')
          payload = {
              'msg_type': 'interactive',
              'card': {
                  'header': {
                      'title': {
                          'tag': 'plain_text',
                          'content': os.environ['ICON'] + ' Mako Meme'
                      },
                      'template': os.environ['TPL']
                  },
                  'elements': [
                      {
                          'tag': 'div',
                          'text': {
                              'tag': 'lark_md',
                              'content': '**项目**: Mako Meme\n**分支**: ' + os.environ['REF'] + '\n**提交**: ' + os.environ['SHA'][:7] + '\n\n**构建结果**:\n' + summary
                          }
                      },
                      {
                          'tag': 'action',
                          'actions': [{
                              'tag': 'button',
                              'text': {'tag': 'plain_text', 'content': '查看构建详情'},
                              'url': 'https://github.com/' + os.environ['REPO'] + '/actions/runs/' + os.environ['RUN_ID'],
                              'type': 'default'
                          }]
                      }
                  ]
              }
          }
          with open('/tmp/feishu_payload.json', 'w') as f:
              json.dump(payload, f, ensure_ascii=False)
          PYEOF

          python3 /tmp/gen_payload.py
          curl -s -X POST -H 'Content-Type: application/json' -d @/tmp/feishu_payload.json "$WEBHOOK_URL"
