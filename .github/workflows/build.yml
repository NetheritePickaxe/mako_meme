# Mako Meme CI/CD
#
# 鎺ㄩ€佹瀯寤?
#   main 鍒嗘敮鎺ㄩ€?鈫?鏋勫缓 Android APK + Web + Windows
# 鎵?Tag 鑷姩 Release:
#   git tag v1.0.0 && git push origin v1.0.0
#   鈫?鏋勫缓鎵€鏈夊钩鍙?+ 鍒涘缓 GitHub Release + 涓婁紶浜х墿
# 鏋勫缓缁撴灉閫氳繃椋炰功 Webhook 閫氱煡

name: CI/CD

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  FLUTTER_VERSION: "3.44.2"

jobs:
  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ 闈欐€佸垎鏋?鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter analyze

  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ Android 鏋勫缓 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  android:
    name: Build Android
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ Web 鏋勫缓 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  web:
    name: Build Web
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ Windows 鏋勫缓 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  windows:
    name: Build Windows
    needs: analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: build/windows/**/Release/

  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ 閮ㄧ讲 Web 鍒?GitHub Pages 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
#   deploy-pages:
#     name: Deploy Web to Pages
#     if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
#     needs: web
#     runs-on: ubuntu-latest
#     continue-on-error: true  # 鏈紑鍚?Pages 鏃朵笉闃诲 CI
#     permissions:
#       pages: write
#       id-token: write
#     environment:
#       name: github-pages
#       url: ${{ steps.deployment.outputs.page_url }}
#     steps:
#       - id: deployment
#         uses: actions/deploy-pages@v4

  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ 鍒涘缓 Release (鎵?Tag 鏃? 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [android, web, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Package artifacts
        shell: bash
        run: |
          mkdir release-artifacts
          cp -r android-apk/* release-artifacts/ 2>/dev/null || true
          cp -r windows-msix/* release-artifacts/ 2>/dev/null || true
          cd web-build && zip -r ../release-artifacts/web-build.zip . && cd ..
      - uses: ncipollo/release-action@v1
        with:
          name: "Mako Meme ${{ github.ref_name }}"
          tag: ${{ github.ref }}
          body: |
            ## Mako Meme ${{ github.ref_name }}

            璺ㄥ钩鍙拌〃鎯呭寘绠＄悊鍣ㄥ彂甯冪増鏈€?
            ### 涓嬭浇

            - **Android**: `app-release.apk`
            - **Windows**: MSIX 瀹夎鍖?            - **Web**: `web-build.zip`锛堣В鍘嬪悗閮ㄧ讲鍒颁换鎰忛潤鎬佹湇鍔″櫒锛?
            > 鏋勫缓浜?${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          artifacts: release-artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}

  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ 椋炰功閫氱煡 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  notify:
    name: Notify Feishu
    if: ${{ always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}
    needs: [analyze, android, web, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Build status summary
        id: status
        shell: bash
        run: |
          STATUS="success"
          MSG=""
          append() {
            local label="$1" result="$2"
            MSG="$MSG$label: $result\n"
            if [ "$result" != "success" ]; then STATUS="failure"; fi
          }
          append "Analyze" "${{ needs.analyze.result }}"
          append "Android" "${{ needs.android.result }}"
          append "Web"     "${{ needs.web.result }}"
          append "Windows" "${{ needs.windows.result }}"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          {
            echo "msg<<EOFMSG"
            printf "%b" "$MSG"
            echo ""
            echo "EOFMSG"
          } >> "$GITHUB_OUTPUT"

      - name: Send Feishu webhook
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STATUS: ${{ steps.status.outputs.status }}
          SUMMARY: ${{ steps.status.outputs.msg }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "FEISHU_WEBHOOK_URL not set, skipping"
            exit 0
          fi

          if [ "$STATUS" = "success" ]; then
            export ICON="鉁? TPL="green"
          else
            export ICON="鉂? TPL="red"
          fi

          # Write Python script to file to avoid YAML indentation issues
          cat > /tmp/gen_payload.py << 'PYEOF'
          import json, os
          summary = os.environ.get('SUMMARY', '')
          payload = {
            'msg_type': 'interactive',
            'card': {
              'header': {
                'title': {
                  'tag': 'plain_text',
                  'content': os.environ['ICON'] + ' Mako Meme ' + os.environ['STATUS']
                },
                'template': os.environ['TPL']
              },
              'elements': [
                {
                  'tag': 'div',
                  'text': {
                    'tag': 'lark_md',
                    'content': '**椤圭洰**: Mako Meme\n**鍒嗘敮**: ' + os.environ['REF'] + '\n**鎻愪氦**: ' + os.environ['SHA'][:7] + '\n\n**鏋勫缓缁撴灉**:\n' + summary
                  }
                },
                {
                  'tag': 'action',
                  'actions': [{
                    'tag': 'button',
                    'text': {'tag': 'plain_text', 'content': '鏌ョ湅鏋勫缓璇︽儏'},
                    'url': 'https://github.com/' + os.environ['REPO'] + '/actions/runs/' + os.environ['RUN_ID'],
                    'type': 'default'
                  }]
                }
              ]
            }
          }
          with open('/tmp/feishu_payload.json', 'w') as f:
              json.dump(payload, f, ensure_ascii=False)
          PYEOF

          python3 /tmp/gen_payload.py
          curl -s -X POST -H 'Content-Type: application/json' -d @/tmp/feishu_payload.json "$WEBHOOK_URL"
